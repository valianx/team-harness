name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: run-all (policy-block + structure + frontmatter)
    runs-on: ubuntu-latest
    env:
      # Node/npm/bun suites must run for real in CI, not silently SKIP —
      # see tests/run-all.sh for the skip-to-fail conversion this enables.
      TH_REQUIRE_RUNTIMES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Conditional-noop gate (WI-5, R2 mitigation) — NOT a `paths-ignore`
      # trigger filter. A `paths-ignore` on the job/workflow trigger would
      # leave this required check permanently "pending" for a diff that
      # matches it, blocking merge. Instead the job always runs (satisfying
      # the required-check contract) and each heavy step below is skipped
      # via `if:` when the diff is release-only (version sites + CHANGELOG +
      # changelog.d/ + version.d/ only — e.g. an inline-release cut). Any
      # diff outside that narrow allowlist, or any failure to compute the
      # diff, defaults to running the full suite (fail-closed toward more
      # verification, never less).
      - name: Detect release-only diff
        id: release-only
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          is_release_only=false
          if [ -n "$BASE_SHA" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true)"
            if [ -n "$changed" ]; then
              is_release_only=true
              while IFS= read -r f; do
                [ -z "$f" ] && continue
                case "$f" in
                  .claude-plugin/plugin.json|.claude-plugin/marketplace.json|CLAUDE.md|CHANGELOG.md|changelog.d/*.md|version.d/*)
                    ;;
                  *)
                    is_release_only=false
                    ;;
                esac
              done <<< "$changed"
            fi
          fi
          echo "is_release_only=$is_release_only" >> "$GITHUB_OUTPUT"
          echo "Release-only diff: $is_release_only"

      - name: Set up Python
        if: steps.release-only.outputs.is_release_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv (for the PyYAML frontmatter test)
        if: steps.release-only.outputs.is_release_only != 'true'
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        if: steps.release-only.outputs.is_release_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        if: steps.release-only.outputs.is_release_only != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Run full verification suite
        if: steps.release-only.outputs.is_release_only != 'true'
        run: bash tests/run-all.sh

      - name: Release-only diff — full verification skipped (conditional no-op)
        if: steps.release-only.outputs.is_release_only == 'true'
        run: echo "Diff is limited to version sites + CHANGELOG.md + changelog.d/ + version.d/ (a release cut) — skipping the full verification suite. This check still ran and reports success; it is not a paths-ignore trigger skip."

  go-test:
    name: go test (installer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go test ./cmd/install
        env:
          # ${{ runner.temp }} is /home/runner/work/_temp — user-owned on GitHub-hosted
          # ubuntu runners.  The default /tmp is root-owned (UID 0), which causes the
          # SEC-01 ancestor-ownership walk in datahome_unix.go to refuse t.TempDir()
          # paths because /tmp is not owned by the runner user (UID 1001).
          TMPDIR: ${{ runner.temp }}
        run: go test ./cmd/install/ -count=1

      - name: Cross-compile all release targets (catch platform-specific build breaks)
        # `go test` above runs only on linux/amd64, so a type that differs by GOOS
        # (e.g. syscall.Stat_t.Mode is uint16 on darwin, uint32 on linux) compiles
        # here but breaks the release cross-compile. Build every release.yml target
        # so such breaks surface on the PR, not at tag time.
        run: |
          set -e
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
            GOOS=${target%-*}
            GOARCH=${target#*-}
            echo "building $GOOS/$GOARCH"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -o /dev/null ./cmd/install
          done

  dist-freshness:
    name: hooks/ts dist freshness (rebuild + diff + completeness)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install hooks/ts dependencies
        working-directory: hooks/ts
        run: npm install --no-audit --no-fund

      - name: Rebuild TS hook bundles
        working-directory: hooks/ts
        run: npm run build

      - name: Fail on stale committed dist (rebuild must match the committed .cjs)
        run: git diff --exit-code hooks/ts/dist/

      - name: Verify every CC entry has a build script
        # Scoped to *.cc.ts (CC ships bundled dist/*.cjs). *.opencode.ts entries
        # are distributed as raw TypeScript source and are never bundled — see
        # cmd/install/manifest_registry.go's opencode plugin component builder.
        run: |
          missing=0
          for entry in hooks/ts/entry/*.cc.ts; do
            name="$(basename "$entry" .cc.ts)"
            if ! grep -q "\"build:$name\"" hooks/ts/package.json; then
              echo "::error::hooks/ts/package.json is missing a \"build:$name\" script for $entry"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more CC hook entries have no build script — their dist/*.cjs can go stale unnoticed."
            exit 1
          fi
