name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: run-all (policy-block + structure + frontmatter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv (for the PyYAML frontmatter test)
        uses: astral-sh/setup-uv@v5

      - name: Run full verification suite
        run: bash tests/run-all.sh
