name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.0). Must already exist."
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Force JavaScript actions (actions/checkout, actions/setup-go, etc.) to run
    # on Node.js 24. GitHub flips the default from Node 20 to Node 24 on
    # 2026-06-02; this opt-in eliminates the deprecation warning that appears
    # in every release run and surfaces any Node 24 incompatibilities before
    # the forced cutover. Once Node 24 is the default, this env var becomes
    # redundant (harmless to keep).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write  # to create the release + upload assets
      actions: write   # to dispatch pages.yml via workflow_dispatch (GITHUB_TOKEN needs this scope)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Cross-compile install binaries
        run: |
          mkdir -p dist
          # Derive the tag from the dispatch input (workflow_dispatch) or the
          # push ref (push: tags). GITHUB_REF_NAME is the branch name on
          # workflow_dispatch, so use the tag input when present.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          for target in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64 windows-amd64; do
              GOOS=$(echo $target | cut -d- -f1)
              GOARCH=$(echo $target | cut -d- -f2)
              EXT=""
              [ "$GOOS" = "windows" ] && EXT=".exe"
              echo "Building install-${target}${EXT}..."
              CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
                  -ldflags="-s -w -X main.version=${VERSION}" \
                  -o dist/install-${target}${EXT} \
                  ./cmd/install
          done
          ls -lah dist/

      - name: Write VERSION asset
        run: |
          # Bare semver (no leading "v") — consumed by update-opencode.{sh,ps1}
          # cheap pre-check via releases/latest/download/VERSION.
          # Use the tag input on workflow_dispatch; GITHUB_REF_NAME is the branch
          # name on manual runs, not the tag.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "$VERSION" > dist/VERSION
          echo "VERSION asset: $(cat dist/VERSION)"

      - name: Compute SHA256 sums
        run: |
          cd dist && sha256sum * > SHA256SUMS && cat SHA256SUMS

      - name: Create / update GH Release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.event.inputs.tag || github.ref_name }}
          # Create release if not exists; --generate-notes produces an auto-generated
          # changelog from PRs since the previous tag.
          if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG exists; uploading assets..."
              gh release upload "$TAG" dist/* --clobber
          else
              gh release create "$TAG" dist/* --generate-notes
          fi

      # Trigger pages.yml explicitly via workflow_dispatch. The `release: published`
      # event emitted by `gh release create` above does NOT chain to pages.yml
      # because GitHub blocks workflow-on-workflow events initiated with
      # GITHUB_TOKEN (anti-loop security feature). The workflow_dispatch event is
      # one of the documented exceptions that DOES chain even via GITHUB_TOKEN.
      # See: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#using-the-github_token-in-a-workflow
      # Without this step, every release requires manual `gh workflow run pages.yml`
      # to publish the updated landing — observed across v2.9.0 through v2.10.0.
      - name: Trigger pages publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages.yml --ref main
          echo "Triggered pages.yml to publish landing for $(echo ${{ github.event.inputs.tag || github.ref_name }})"
