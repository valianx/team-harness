name: Publish bootstrap scripts to GitHub Pages

on:
  release:
    types: [published]
  # Allow manual re-publish from the Actions tab if a release was created
  # before this workflow existed (or if Pages went sideways — R7 recovery).
  workflow_dispatch:

# Deny by default; only the deploy job opts in.
permissions:
  contents: read

# Prevent two publishes from racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Force JavaScript actions to run on Node.js 24. See release.yml for rationale.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Stage bootstrap scripts and landing page
        run: |
          mkdir -p public
          cp bin/install.sh          public/install.sh
          cp bin/install.ps1         public/install.ps1
          cp bin/install.cmd         public/install.cmd
          cp bin/install-opencode.sh public/install-opencode.sh
          cp -r site/. public/
          ls -lah public/

      - name: Substitute current version into landing page
        run: |
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' cmd/install/main.go)
          if [ -z "$VERSION" ]; then
            echo "Error: could not extract version from cmd/install/main.go" >&2
            exit 1
          fi
          echo "Substituting {{VERSION}} -> v${VERSION} in public/index.html"
          sed -i "s|{{VERSION}}|v${VERSION}|g" public/index.html
          # Sanity: the placeholder must not survive the substitution.
          if grep -q '{{VERSION}}' public/index.html; then
            echo "Error: {{VERSION}} placeholder still present after sed substitution" >&2
            exit 1
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Release-time smoke probes (R2 mitigation). Fails the workflow loudly if
      # either published URL is unreachable so a bad publish is visible in the
      # Actions tab and surfaces a red badge on the release page.
      - name: Smoke-probe published install.sh
        run: |
          URL="https://valianx.github.io/team-harness/install.sh"
          echo "Probing ${URL}..."
          # Pages cache may need a few seconds to invalidate; retry up to 60s.
          for i in 1 2 3 4 5 6; do
              if curl -fsSL --max-time 10 -o /dev/null "$URL"; then
                  echo "OK: ${URL} reachable."
                  exit 0
              fi
              echo "Attempt $i failed, sleeping 10s..."
              sleep 10
          done
          echo "Error: ${URL} did not become reachable within 60s." >&2
          exit 1

      - name: Smoke-probe published install-opencode.sh
        run: |
          URL="https://valianx.github.io/team-harness/install-opencode.sh"
          echo "Probing ${URL}..."
          # Pages cache may need a few seconds to invalidate; retry up to 60s.
          for i in 1 2 3 4 5 6; do
              if curl -fsSL --max-time 10 -o /dev/null "$URL"; then
                  echo "OK: ${URL} reachable."
                  exit 0
              fi
              echo "Attempt $i failed, sleeping 10s..."
              sleep 10
          done
          echo "Error: ${URL} did not become reachable within 60s." >&2
          exit 1

      - name: Smoke-probe published root index
        run: |
          URL="https://valianx.github.io/team-harness/"
          echo "Probing ${URL}..."
          for i in 1 2 3 4 5 6; do
              if curl -fsSL --max-time 10 -o /dev/null "$URL"; then
                  echo "OK: ${URL} reachable."
                  exit 0
              fi
              echo "Attempt $i failed, sleeping 10s..."
              sleep 10
          done
          echo "Error: ${URL} did not become reachable within 60s." >&2
          exit 1
