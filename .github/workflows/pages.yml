name: Publish bootstrap scripts to GitHub Pages

on:
  release:
    types: [published]
  # Allow manual re-publish from the Actions tab if a release was created
  # before this workflow existed (or if Pages went sideways — R7 recovery).
  workflow_dispatch:

# Deny by default; only the deploy job opts in.
permissions:
  contents: read

# Prevent two publishes from racing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage bootstrap scripts
        run: |
          mkdir -p public
          cp bin/install.sh  public/install.sh
          cp bin/install.ps1 public/install.ps1
          cp bin/install.cmd public/install.cmd
          # A minimal landing page so visiting the root URL gives the operator something.
          cat > public/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>team-harness installer</title>
          <pre style="font-family: ui-monospace,monospace; line-height:1.5">
          team-harness — install in one command

          Unix / macOS:
              curl -fsSL https://valianx.github.io/team-harness/install.sh | bash

          Windows (PowerShell):
              irm https://valianx.github.io/team-harness/install.ps1 | iex

          Windows (cmd.exe):
              curl -fsSL https://valianx.github.io/team-harness/install.cmd -o install.cmd && install.cmd

          Source: https://github.com/valianx/team-harness
          </pre>
          HTML
          ls -lah public/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Release-time smoke probe (R2 mitigation). Fails the workflow loudly if
      # the published URL is unreachable so a bad publish is visible in the
      # Actions tab and surfaces a red badge on the release page.
      - name: Smoke-probe published install.sh
        run: |
          URL="https://valianx.github.io/team-harness/install.sh"
          echo "Probing ${URL}..."
          # Pages cache may need a few seconds to invalidate; retry up to 60s.
          for i in 1 2 3 4 5 6; do
              if curl -fsSL --max-time 10 -o /dev/null "$URL"; then
                  echo "OK: ${URL} reachable."
                  exit 0
              fi
              echo "Attempt $i failed, sleeping 10s..."
              sleep 10
          done
          echo "Error: ${URL} did not become reachable within 60s." >&2
          exit 1
